version: '3.8'

services:
  tripplanner-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tripplanner-api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      # For development: mount source code to enable live reload
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - tripplanner-network

  # Optional: Add a mock service if you later want to test microservices
  # flight-agent-service:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.agent
  #     args:
  #       AGENT_MODULE: Agents.flight_agent
  #   container_name: flight-agent
  #   ports:
  #     - "8001:8000"
  #   environment:
  #     - OPENAI_API_KEY=${OPENAI_API_KEY}
  #   networks:
  #     - tripplanner-network

networks:
  tripplanner-network:
    driver: bridge
